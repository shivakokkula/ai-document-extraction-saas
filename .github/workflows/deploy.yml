name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/docuparsea-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.ECR_REGISTRY }}/docuparsea-backend:${{ github.sha }}

      - name: Build & push ai-service
        run: |
          docker build -t ${{ secrets.ECR_REGISTRY }}/docuparsea-ai:${{ github.sha }} ./ai-service
          docker push ${{ secrets.ECR_REGISTRY }}/docuparsea-ai:${{ github.sha }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service --cluster docuparsea-prod --service backend --force-new-deployment
          aws ecs update-service --cluster docuparsea-prod --service ai-service --force-new-deployment
